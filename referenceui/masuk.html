<!DOCTYPE html>
<html lang="id" class="bg-background">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk — KlipKlop</title>
  <meta name="description" content="Masuk atau daftar KlipKlop untuk mulai mengubah video panjang menjadi klip viral vertikal dengan AI." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#121212',
            foreground: '#f5f2eb',
            card: '#1c1a17',
            secondary: '#26231f',
            muted: '#a39e93',
            primary: { DEFAULT: '#f59e0b', foreground: '#121212' },
            line: '#2e2a24'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            display: ['"Space Grotesk"', 'system-ui', 'sans-serif']
          },
          keyframes: {
            'float-bob': {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' }
            },
            'fade-in-up': {
              from: { opacity: '0', transform: 'translateY(16px)' },
              to: { opacity: '1', transform: 'translateY(0)' }
            },
            'glow-pulse': {
              '0%, 100%': { opacity: '0.7', transform: 'scale(1)' },
              '50%': { opacity: '1', transform: 'scale(1.08)' }
            }
          },
          animation: {
            'float-bob': 'float-bob 5s ease-in-out infinite',
            'fade-in-up': 'fade-in-up 0.7s ease-out both',
            'glow-pulse': 'glow-pulse 6s ease-in-out infinite'
          }
        }
      }
    }
  </script>
  <style>
    :root { color-scheme: dark; }
    /* Tab state via aria-selected (tidak bisa lewat utility statis) */
    .tab[aria-selected="true"] { background: #f59e0b; color: #121212; }
    @media (prefers-reduced-motion: reduce) {
      .animate-float-bob, .animate-fade-in-up, .animate-glow-pulse { animation: none !important; }
    }
  </style>
</head>
<body class="min-h-svh bg-background font-sans text-foreground antialiased">
  <main class="flex min-h-svh flex-col lg:flex-row">
    <!-- Left: hero -->
    <section class="relative flex flex-1 flex-col justify-between gap-12 overflow-hidden border-b border-line bg-card/50 p-8 lg:border-b-0 lg:border-r lg:p-14" aria-label="Tentang KlipKlop">
      <div class="animate-glow-pulse pointer-events-none absolute -right-32 -top-32 size-96 rounded-full bg-primary/15 blur-3xl" aria-hidden="true"></div>
      <div class="animate-glow-pulse pointer-events-none absolute -bottom-40 -left-24 size-80 rounded-full bg-primary/10 blur-3xl" style="animation-delay: 3s;" aria-hidden="true"></div>
      <div class="pointer-events-none absolute inset-0 opacity-15 [background-image:radial-gradient(circle,#a39e93_1px,transparent_1px)] [background-size:28px_28px]" aria-hidden="true"></div>

      <a href="index.html" class="relative flex w-fit items-center gap-2.5">
        <span class="flex size-9 items-center justify-center rounded-xl bg-primary text-primary-foreground">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><path d="M8.12 8.12 12 12"/><path d="M20 4 8.12 15.88"/><circle cx="6" cy="18" r="3"/><path d="M14.8 14.8 20 20"/></svg>
        </span>
        <span class="font-display text-xl font-bold">KlipKlop</span>
      </a>

      <div class="relative flex flex-col gap-6">
        <span class="animate-fade-in-up inline-flex w-fit items-center gap-2 rounded-full border border-primary/40 bg-primary/10 px-4 py-1.5 text-xs font-bold text-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg>
          AI Klip Generator
        </span>
        <h2 class="animate-fade-in-up font-display text-4xl font-bold leading-[1.15] text-balance lg:text-5xl" style="animation-delay: 0.1s;">Upload videomu, biar KlipKlop cari momen <span class="italic text-primary">terbaiknya.</span></h2>

        <div class="animate-fade-in-up relative h-64 w-full max-w-md select-none lg:h-72" style="animation-delay: 0.25s;" aria-hidden="true">
          <div class="absolute left-0 top-8 z-10 w-32 -rotate-6 transition-transform duration-300 hover:-translate-y-2 hover:rotate-0 lg:w-36">
            <div class="animate-float-bob relative aspect-[9/16] overflow-hidden rounded-xl border border-line shadow-2xl">
              <img src="images/clip-vertical-1.png" alt="" class="absolute inset-0 size-full object-cover" />
              <span class="absolute left-1.5 top-1.5 flex items-center gap-1 rounded-full bg-primary px-2 py-0.5 text-[0.625rem] font-bold text-primary-foreground">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
                90%
              </span>
              <span class="absolute bottom-1.5 right-1.5 rounded-full bg-background/80 px-2 py-0.5 text-[0.625rem] font-medium backdrop-blur">112s</span>
              <span class="absolute inset-0 flex items-center justify-center"><span class="flex size-8 items-center justify-center rounded-full bg-background/60 text-foreground backdrop-blur"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg></span></span>
            </div>
          </div>
          <div class="absolute left-[30%] top-0 z-20 w-32 rotate-3 transition-transform duration-300 hover:-translate-y-2 hover:rotate-0 lg:w-36">
            <div class="animate-float-bob relative aspect-[9/16] overflow-hidden rounded-xl border border-line shadow-2xl" style="animation-delay: 0.8s;">
              <img src="images/clip-vertical-2.png" alt="" class="absolute inset-0 size-full object-cover" />
              <span class="absolute left-1.5 top-1.5 flex items-center gap-1 rounded-full bg-primary px-2 py-0.5 text-[0.625rem] font-bold text-primary-foreground">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
                84%
              </span>
              <span class="absolute bottom-1.5 right-1.5 rounded-full bg-background/80 px-2 py-0.5 text-[0.625rem] font-medium backdrop-blur">96s</span>
              <span class="absolute inset-0 flex items-center justify-center"><span class="flex size-8 items-center justify-center rounded-full bg-background/60 text-foreground backdrop-blur"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg></span></span>
            </div>
          </div>
          <div class="absolute left-[60%] top-12 z-10 w-32 rotate-12 transition-transform duration-300 hover:-translate-y-2 hover:rotate-0 lg:w-36">
            <div class="animate-float-bob relative aspect-[9/16] overflow-hidden rounded-xl border border-line shadow-2xl" style="animation-delay: 1.6s;">
              <img src="images/clip-vertical-3.png" alt="" class="absolute inset-0 size-full object-cover" />
              <span class="absolute left-1.5 top-1.5 flex items-center gap-1 rounded-full bg-primary px-2 py-0.5 text-[0.625rem] font-bold text-primary-foreground">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
                88%
              </span>
              <span class="absolute bottom-1.5 right-1.5 rounded-full bg-background/80 px-2 py-0.5 text-[0.625rem] font-medium backdrop-blur">78s</span>
              <span class="absolute inset-0 flex items-center justify-center"><span class="flex size-8 items-center justify-center rounded-full bg-background/60 text-foreground backdrop-blur"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg></span></span>
            </div>
          </div>
        </div>

        <dl class="animate-fade-in-up flex max-w-md items-center justify-between gap-4 border-t border-line pt-6" style="animation-delay: 0.4s;">
          <div class="flex flex-col gap-1">
            <dd class="m-0 font-display text-2xl font-bold text-primary">12K+</dd>
            <dt class="text-xs text-muted">Klip dihasilkan</dt>
          </div>
          <div class="flex flex-col gap-1">
            <dd class="m-0 font-display text-2xl font-bold text-primary">92%</dd>
            <dt class="text-xs text-muted">Skor viral tertinggi</dt>
          </div>
          <div class="flex flex-col gap-1">
            <dd class="m-0 font-display text-2xl font-bold text-primary">3 mnt</dd>
            <dt class="text-xs text-muted">Rata-rata proses</dt>
          </div>
        </dl>
      </div>

      <p class="relative text-xs text-muted">KlipKlop Web</p>
    </section>

    <!-- Right: auth form -->
    <section class="flex flex-1 items-center justify-center p-8 lg:p-14" aria-label="Formulir masuk dan daftar">
      <div class="animate-fade-in-up flex w-full max-w-md flex-col gap-6 rounded-2xl border border-line bg-card p-8" style="animation-delay: 0.2s;">
        <div class="flex flex-col gap-2">
          <h1 class="font-display text-2xl font-bold" id="auth-title">Masuk</h1>
          <p class="text-sm leading-relaxed text-muted" id="auth-sub">Lanjutkan ke dashboard KlipKlop.</p>
        </div>

        <div class="grid grid-cols-2 gap-1 rounded-xl border border-line bg-secondary p-1" role="tablist" aria-label="Pilih mode autentikasi">
          <button type="button" class="tab h-10 rounded-lg bg-transparent text-sm font-bold capitalize text-muted transition-colors hover:text-foreground" role="tab" aria-selected="true" data-mode="masuk">Masuk</button>
          <button type="button" class="tab h-10 rounded-lg bg-transparent text-sm font-bold capitalize text-muted transition-colors hover:text-foreground" role="tab" aria-selected="false" data-mode="daftar">Daftar</button>
        </div>

        <form class="flex flex-col gap-4" id="auth-form">
          <div class="hidden flex-col gap-2" id="field-nama">
            <label for="auth-name" class="text-sm font-medium">Nama</label>
            <input id="auth-name" type="text" placeholder="Nama kamu" autocomplete="name"
              class="h-11 w-full rounded-xl border border-line bg-secondary px-4 text-sm text-foreground placeholder:text-muted focus:border-transparent focus:outline-none focus:ring-2 focus:ring-primary" />
          </div>

          <div class="flex flex-col gap-2">
            <label for="auth-email" class="text-sm font-medium">Email</label>
            <input id="auth-email" type="email" placeholder="nama@email.com" autocomplete="email"
              class="h-11 w-full rounded-xl border border-line bg-secondary px-4 text-sm text-foreground placeholder:text-muted focus:border-transparent focus:outline-none focus:ring-2 focus:ring-primary" />
          </div>

          <div class="flex flex-col gap-2">
            <label for="auth-password" class="text-sm font-medium">Password</label>
            <div class="relative">
              <input id="auth-password" type="password" placeholder="Minimal 6 karakter" autocomplete="current-password"
                class="h-11 w-full rounded-xl border border-line bg-secondary pl-4 pr-11 text-sm text-foreground placeholder:text-muted focus:border-transparent focus:outline-none focus:ring-2 focus:ring-primary" />
              <button type="button" class="absolute right-3 top-1/2 flex -translate-y-1/2 p-1 text-muted transition-colors hover:text-foreground" id="toggle-password" aria-label="Tampilkan password">
                <svg id="icon-eye" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                <svg id="icon-eye-off" class="hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>
              </button>
            </div>
          </div>

          <div class="flex justify-end" id="forgot-row">
            <button type="button" class="p-0 text-xs font-medium text-primary transition-opacity hover:opacity-80">Lupa password?</button>
          </div>

          <button type="submit" class="mt-2 flex h-12 items-center justify-center gap-2 rounded-xl bg-primary font-display text-base font-bold text-primary-foreground transition-opacity hover:opacity-90" id="submit-btn">
            <svg id="icon-login" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m10 17 5-5-5-5"/><path d="M15 12H3"/><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/></svg>
            <svg id="icon-userplus" class="hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 21a8 8 0 0 1 13.292-6"/><circle cx="10" cy="8" r="5"/><line x1="19" x2="19" y1="16" y2="22"/><line x1="16" x2="22" y1="19" y2="19"/></svg>
            <span id="submit-label">Masuk</span>
          </button>
        </form>

        <p class="text-center text-xs leading-relaxed text-muted">Dengan melanjutkan, kamu menyetujui <a href="#" class="font-medium text-foreground hover:underline hover:underline-offset-2">Syarat &amp; Ketentuan</a> KlipKlop.</p>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var mode = 'masuk';
      var tabs = document.querySelectorAll('.tab');
      var authTitle = document.getElementById('auth-title');
      var authSub = document.getElementById('auth-sub');
      var fieldNama = document.getElementById('field-nama');
      var forgotRow = document.getElementById('forgot-row');
      var submitLabel = document.getElementById('submit-label');
      var iconLogin = document.getElementById('icon-login');
      var iconUserplus = document.getElementById('icon-userplus');
      var passwordInput = document.getElementById('auth-password');

      function setMode(next) {
        mode = next;
        tabs.forEach(function (tab) {
          tab.setAttribute('aria-selected', String(tab.dataset.mode === mode));
        });
        var isMasuk = mode === 'masuk';
        authTitle.textContent = isMasuk ? 'Masuk' : 'Buat Akun';
        authSub.textContent = isMasuk
          ? 'Lanjutkan ke dashboard KlipKlop.'
          : 'Gratis. Mulai bikin klip viral dalam hitungan menit.';
        fieldNama.classList.toggle('hidden', isMasuk);
        fieldNama.classList.toggle('flex', !isMasuk);
        forgotRow.classList.toggle('hidden', !isMasuk);
        submitLabel.textContent = isMasuk ? 'Masuk' : 'Daftar Sekarang';
        iconLogin.classList.toggle('hidden', !isMasuk);
        iconUserplus.classList.toggle('hidden', isMasuk);
        passwordInput.setAttribute('autocomplete', isMasuk ? 'current-password' : 'new-password');
      }

      tabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
          setMode(tab.dataset.mode);
        });
      });

      // Password visibility toggle
      var toggleBtn = document.getElementById('toggle-password');
      var iconEye = document.getElementById('icon-eye');
      var iconEyeOff = document.getElementById('icon-eye-off');
      toggleBtn.addEventListener('click', function () {
        var isHidden = passwordInput.type === 'password';
        passwordInput.type = isHidden ? 'text' : 'password';
        iconEye.classList.toggle('hidden', isHidden);
        iconEyeOff.classList.toggle('hidden', !isHidden);
        toggleBtn.setAttribute('aria-label', isHidden ? 'Sembunyikan password' : 'Tampilkan password');
      });

      // Prevent default submit
      document.getElementById('auth-form').addEventListener('submit', function (e) {
        e.preventDefault();
      });
    })();
  </script>
</body>
</html>

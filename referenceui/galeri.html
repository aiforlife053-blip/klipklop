<!DOCTYPE html>
<html lang="id" class="bg-background">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Galeri — KlipKlop</title>
<meta name="description" content="Semua klip viral yang pernah Anda proses tersimpan di sini." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          background: '#131417',
          foreground: '#ebecef',
          card: '#1c1d22',
          secondary: '#24262c',
          muted: '#8f929c',
          primary: { DEFAULT: '#f2a33c', foreground: '#2b1e08' },
          destructive: '#e05d47',
          line: 'rgba(255,255,255,0.08)',
          field: 'rgba(255,255,255,0.1)'
        },
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
          display: ['"Space Grotesk"', 'system-ui', 'sans-serif']
        }
      }
    }
  }
</script>
<style>
  :root { color-scheme: dark; }
</style>
</head>
<body class="min-h-dvh bg-background font-sans text-foreground antialiased">

<header class="sticky top-0 z-40 border-b border-line bg-background/80 backdrop-blur-md">
  <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-6">
    <a href="index.html" class="flex items-center gap-2.5">
      <span class="flex size-8 items-center justify-center rounded-lg bg-primary text-primary-foreground">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><path d="M8.12 8.12 12 12"/><path d="M20 4 8.12 15.88"/><circle cx="6" cy="18" r="3"/><path d="M14.8 14.8 20 20"/></svg>
      </span>
      <span class="font-display text-lg font-bold tracking-tight">KlipKlop</span>
    </a>
    <nav class="hidden items-center gap-1 md:flex" aria-label="Navigasi utama">
      <a href="index.html" class="rounded-full px-4 py-2 text-sm text-muted transition-colors hover:bg-secondary hover:text-foreground">Dashboard</a>
      <a href="galeri.html" class="rounded-full bg-primary/15 px-4 py-2 text-sm font-medium text-primary" aria-current="page">Galeri</a>
      <a href="konsol.html" class="rounded-full px-4 py-2 text-sm text-muted transition-colors hover:bg-secondary hover:text-foreground">Konsol</a>
      <a href="preview-editor.html" class="rounded-full px-4 py-2 text-sm text-muted transition-colors hover:bg-secondary hover:text-foreground">Preview Editor</a>
    </nav>
    <div class="flex items-center gap-2">
      <a href="pengaturan.html" class="flex size-9 items-center justify-center rounded-full border border-line text-muted transition-colors hover:bg-secondary hover:text-foreground" aria-label="Pengaturan">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </a>
      <button type="button" class="flex size-9 items-center justify-center rounded-full border border-line bg-secondary text-muted transition-colors hover:text-foreground" aria-label="Akun">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
    </div>
  </div>
  <nav class="flex items-center gap-1 overflow-x-auto border-t border-line px-4 py-2 md:hidden" aria-label="Navigasi mobile">
    <a href="index.html" class="whitespace-nowrap rounded-full px-3.5 py-1.5 text-sm text-muted">Dashboard</a>
    <a href="galeri.html" class="whitespace-nowrap rounded-full bg-primary/15 px-3.5 py-1.5 text-sm font-medium text-primary" aria-current="page">Galeri</a>
    <a href="konsol.html" class="whitespace-nowrap rounded-full px-3.5 py-1.5 text-sm text-muted">Konsol</a>
    <a href="preview-editor.html" class="whitespace-nowrap rounded-full px-3.5 py-1.5 text-sm text-muted">Preview Editor</a>
  </nav>
</header>

<main class="mx-auto flex max-w-7xl flex-col gap-8 px-6 py-10">
  <div class="flex flex-col gap-2">
    <p class="text-sm font-medium uppercase tracking-widest text-primary">Galeri</p>
    <h1 class="font-display text-3xl font-bold tracking-tight md:text-4xl">Koleksi Klip</h1>
    <p class="text-muted">Semua klip viral yang pernah Anda proses tersimpan di sini.</p>
  </div>

  <div class="grid grid-cols-2 gap-4 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5" id="gallery-grid"></div>
</main>

<!-- Modal detail klip -->
<div id="clip-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 sm:p-8" role="dialog" aria-modal="true" aria-label="Detail klip">
  <button type="button" id="modal-backdrop" class="absolute inset-0 bg-background/80" aria-label="Tutup detail klip"></button>
  <div class="relative z-10 grid max-h-[90dvh] w-full max-w-3xl gap-6 overflow-y-auto rounded-2xl border border-line bg-card p-6 shadow-2xl md:grid-cols-[280px_1fr] md:p-8">
    <button type="button" id="modal-close" class="absolute right-4 top-4 z-10 flex size-9 items-center justify-center rounded-full border border-line bg-secondary text-muted transition-colors hover:text-foreground" aria-label="Tutup">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
    <div class="relative mx-auto aspect-[9/16] w-full max-w-[280px] overflow-hidden rounded-xl border border-line">
      <img id="modal-image" src="/placeholder.svg" alt="" class="absolute inset-0 size-full object-cover" />
      <span class="absolute left-3 top-3 flex items-center gap-1.5 rounded-full bg-primary px-2.5 py-1 text-xs font-bold text-primary-foreground">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
        <span id="modal-virality"></span>
      </span>
      <button type="button" class="absolute inset-0 flex items-center justify-center transition-colors hover:bg-background/30" aria-label="Putar klip">
        <span class="flex size-14 items-center justify-center rounded-full bg-primary text-primary-foreground">
          <svg class="ml-0.5" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
        </span>
      </button>
    </div>
    <div class="flex flex-col gap-5 md:pr-8">
      <p id="modal-meta" class="text-sm text-muted"></p>
      <h2 id="modal-title" class="font-display text-[1.75rem] font-bold leading-tight tracking-tight"></h2>
      <div class="flex flex-col gap-2">
        <h3 class="text-sm font-bold">Description</h3>
        <div class="flex flex-col gap-3 rounded-xl border border-line bg-secondary/50 p-4 text-sm leading-relaxed text-muted">
          <p id="modal-desc"></p>
          <p>sc: @klipklop</p>
        </div>
      </div>
      <div class="mt-auto flex flex-wrap gap-3 pt-4">
        <button type="button" class="flex h-11 items-center gap-2 rounded-xl bg-primary px-5 text-sm font-bold text-primary-foreground transition-opacity hover:opacity-90">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/><path d="M7 3v4a1 1 0 0 0 1 1h7"/></svg>
          Simpan ke Gallery
        </button>
        <button type="button" class="flex h-11 items-center gap-2 rounded-xl border border-line bg-secondary px-5 text-sm font-medium transition-colors hover:bg-secondary/70">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
          Download
        </button>
        <button type="button" class="flex h-11 items-center gap-2 rounded-xl border border-line bg-secondary px-5 text-sm font-medium transition-colors hover:bg-secondary/70">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
          Upload
        </button>
        <button type="button" class="flex h-11 items-center gap-2 rounded-xl border border-destructive/40 bg-destructive/10 px-5 text-sm font-medium text-destructive transition-colors hover:bg-destructive/20">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
          Hapus
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  var clips = [
    {
      id: 1,
      title: 'Trauma Nyuntik Pasien: Pembuluh Darah Pecah!',
      description: 'Tretan Muslim berbagi pengalaman horor saat masih jadi perawat, salah menyuntik pasien hingga pembuluh darah pecah.',
      virality: 90,
      duration: '112s',
      date: '10 Jul 26, 00.34',
      image: 'images/clip-vertical-2.png'
    },
    {
      id: 2,
      title: 'Dari Nebeng Kru sampai Kredit Mobil Sendiri',
      description: 'Sintya cerita perjuangannya saat masih di FTV, dari harus berangkat jam 5 pagi, mobil kru penuh sesak.',
      virality: 80,
      duration: '111s',
      date: '9 Jul 26, 23.38',
      image: 'images/clip-vertical-1.png'
    }
  ];

  var flameSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>';
  var clockSvg = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
  var playSvg = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="ml-0.5"><polygon points="6 3 20 12 6 21 6 3"/></svg>';

  var grid = document.getElementById('gallery-grid');
  clips.forEach(function (clip) {
    var article = document.createElement('article');
    article.className = 'group flex flex-col overflow-hidden rounded-2xl border border-line bg-card transition-colors hover:border-primary/40';
    article.innerHTML =
      '<button type="button" class="clip-thumb relative aspect-[4/5] w-full overflow-hidden p-0 text-left" aria-label="Lihat detail klip: ' + clip.title + '">' +
        '<img src="' + clip.image + '" alt="Thumbnail klip: ' + clip.title + '" class="size-full object-cover transition-transform duration-300 group-hover:scale-105" />' +
        '<span class="absolute inset-x-0 top-0 flex items-start justify-between p-3">' +
          '<span class="flex items-center gap-1.5 rounded-full bg-primary px-2.5 py-1 text-xs font-bold text-primary-foreground">' + flameSvg + clip.virality + '%</span>' +
          '<span class="flex items-center gap-1 rounded-full bg-background/70 px-2.5 py-1 text-xs font-medium backdrop-blur">' + clockSvg + clip.duration + '</span>' +
        '</span>' +
        '<span class="absolute inset-0 flex flex-col items-center justify-center gap-2.5 bg-background/60 opacity-0 transition-opacity group-hover:opacity-100">' +
          '<span class="flex size-11 items-center justify-center rounded-full bg-primary text-primary-foreground">' + playSvg + '</span>' +
          '<span class="rounded-full bg-primary px-3.5 py-1 text-xs font-bold text-primary-foreground">Lihat Detail</span>' +
        '</span>' +
      '</button>' +
      '<div class="flex flex-1 flex-col gap-1.5 p-3.5">' +
        '<h2 class="line-clamp-2 font-display text-sm font-bold leading-snug">' + clip.title + '</h2>' +
        '<p class="mt-auto text-xs text-muted">' + clip.duration + ' \u2022 ' + clip.date + '</p>' +
      '</div>';
    article.querySelector('.clip-thumb').addEventListener('click', function () { openModal(clip); });
    grid.appendChild(article);
  });

  var modal = document.getElementById('clip-modal');
  function openModal(clip) {
    document.getElementById('modal-image').src = clip.image;
    document.getElementById('modal-image').alt = 'Pratinjau klip ' + clip.title;
    document.getElementById('modal-virality').textContent = clip.virality + '%';
    document.getElementById('modal-meta').textContent = 'Durasi: ' + clip.duration + ' \u2022 Diunduh: ' + clip.date;
    document.getElementById('modal-title').textContent = clip.title;
    document.getElementById('modal-desc').textContent = clip.description;
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    document.body.style.overflow = 'hidden';
  }
  function closeModal() {
    modal.classList.add('hidden');
    modal.classList.remove('flex');
    document.body.style.overflow = '';
  }
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').addEventListener('click', closeModal);
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeModal();
  });
</script>
</body>
</html>

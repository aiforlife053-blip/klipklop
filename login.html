<!doctype html>
<html lang="id">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Masuk KlipKlop</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/static/styles.css?v=20260708-5" />
        <style>
            .auth-tab-active {
                background: #ea580c !important;
                color: #fff !important;
            }
            .auth-tab-inactive {
                background: transparent !important;
                color: #64748b !important;
            }
            .auth-submit {
                background: #ea580c !important;
                color: #fff !important;
            }
            .auth-input {
                background: #ffffff !important;
                color: #0f172a !important;
                -webkit-text-fill-color: #0f172a !important;
                caret-color: #0f172a;
            }
            .auth-input:focus {
                border-color: #ea580c !important;
                box-shadow: none !important;
                --tw-ring-shadow: 0 0 #0000 !important;
            }
            input.auth-input:-webkit-autofill,
            input.auth-input:-webkit-autofill:hover,
            input.auth-input:-webkit-autofill:focus {
                -webkit-box-shadow: 0 0 0 1000px #ffffff inset !important;
                -webkit-text-fill-color: #0f172a !important;
                transition: background-color 9999s ease-in-out 0s;
            }
        </style>
    </head>
    <body
        class="min-h-dvh bg-[#f8fafc] text-gray-900 antialiased"
        style="font-family: Urbanist, sans-serif"
    >
        <main class="grid min-h-dvh lg:grid-cols-[1.05fr_.95fr]">
            <section
                class="hidden lg:flex relative overflow-hidden flex-col justify-between border-r border-gray-200 bg-[#f9fafb] p-10 before:absolute before:-right-32 before:top-24 before:h-80 before:w-80 before:rounded-full before:bg-[#ea580c]/10 before:blur-3xl after:absolute after:left-10 after:bottom-20 after:h-40 after:w-40 after:rounded-full after:bg-[#ea580c]/5 after:blur-2xl"
            >
                <div
                    class="relative z-10 flex items-center gap-3 font-extrabold text-2xl"
                >
                    <img
                        src="/logo%20klipklop.png?v=3"
                        class="h-10 w-10 rounded-xl object-contain"
                        alt="KlipKlop"
                    /><span>KlipKlop</span>
                </div>
                <div class="relative z-10 max-w-xl space-y-5">
                    <h1
                        class="text-5xl font-extrabold tracking-tight leading-tight"
                    >
                        Upload videomu, biar Kliplop cari momen
                        <span class="italic text-[#ea580c]">terbaiknya</span>.
                    </h1>
                    <p class="text-lg leading-8 text-gray-600">
                        Kliplop membantu mengubah video panjang menjadi klip
                        pendek yang menarik, lengkap dengan caption, dan siap
                        kamu upload ke YouTube.
                    </p>
                </div>
                <p class="relative z-10 text-sm text-gray-500">KlipKlop Web</p>
            </section>
            <section class="flex items-center justify-center p-6">
                <div
                    class="w-full max-w-sm rounded-2xl border border-gray-200 bg-white p-5 shadow-2xl shadow-gray-200/50"
                >
                    <div
                        class="mb-7 lg:hidden flex items-center gap-3 font-extrabold text-xl"
                    >
                        <img
                            src="/logo%20klipklop.png?v=3"
                            class="h-9 w-9 rounded-xl object-contain"
                            alt="KlipKlop"
                        /><span>KlipKlop</span>
                    </div>
                    <div class="mb-6">
                        <h2
                            id="title"
                            class="text-2xl font-extrabold tracking-tight"
                        >
                            Masuk
                        </h2>
                        <p id="subtitle" class="mt-2 text-sm text-gray-500">
                            Lanjutkan ke dashboard KlipKlop.
                        </p>
                    </div>
                    <div
                        class="mb-5 grid grid-cols-2 rounded-2xl bg-[#f1f5f9] p-1 text-sm font-bold"
                    >
                        <button
                            id="tab-login"
                            class="auth-tab-active rounded-xl px-3 py-2.5 transition"
                            type="button"
                        >
                            Masuk</button
                        ><button
                            id="tab-signup"
                            class="auth-tab-inactive rounded-xl px-3 py-2.5 transition"
                            type="button"
                        >
                            Daftar
                        </button>
                    </div>
                    <form id="form" class="space-y-4">
                        <label class="block text-sm font-bold text-gray-700"
                            >Email<input
                                id="email"
                                class="auth-input mt-1 w-full rounded-xl placeholder:text-gray-400 border border-gray-200 px-4 py-3 outline-none"
                                type="email"
                                autocomplete="email"
                                placeholder="nama@email.com"
                                required /></label
                        ><label class="block text-sm font-bold text-gray-700"
                            >Password<input
                                id="password"
                                class="auth-input mt-1 w-full rounded-xl border border-gray-200 px-4 py-3 outline-none"
                                type="password"
                                autocomplete="current-password"
                                placeholder="Minimal 6 karakter"
                                required /></label
                        ><button
                            id="submit"
                            class="auth-submit w-full rounded-xl px-4 py-3 font-extrabold transition hover:bg-orange-600"
                            type="submit"
                        >
                            Masuk
                        </button>
                        <p
                            id="error"
                            class="min-h-5 text-sm font-semibold text-red-500"
                        ></p>
                    </form>
                </div>
            </section>
        </main>
        <script src="/static/src/login.js?v=20260708-4"></script>
    </body>
</html>
